<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حكم أمير المؤمنين</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body class="bg-gray-100 font-sans min-h-screen flex items-center justify-center p-4">

<div id="quote-card" class="bg-white rounded-3xl p-8 border-4 border-gray-300 shadow-2xl max-w-md w-full relative">
    <div id="quote-text" class="text-2xl font-bold mb-6 text-gray-800 transition-opacity duration-500"></div>
    <button onclick="downloadImage()" class="mt-4 bg-blue-500 text-white px-4 py-2 rounded-xl">تحميل كصورة</button>
</div>

<script>
    const quotesData = [

 { text: "إِنَّ الدُّنْيَا رُبَّمَا أَقْبَلَتْ عَلَى الْجَاهِلِ بِالِاتِّفَاقِ."},
    { text: "إِنَّ الدُّنْيَا سَرِيعَةُ التَّحَوُّلِ."},
    { text: "إِنَّ الدُّنْيَا ظِلُّ الْغَمَامِ وَحُلْمُ الْمَنَامِ."},
    { text: "إِنَّ الدُّنْيَا عَيْشُهَا قَصِيرٌ."},
      
    ];
    function displayRandomQuote() {
        const quote = quotesData[Math.floor(Math.random() * quotesData.length)];
        document.getElementById('quote-text').innerText = quote.text;
    }
    
    function downloadImage() {
        html2canvas(document.querySelector("#quote-card")).then(canvas => {
            const link = document.createElement('a');
            link.download = 'quote.png';
            link.href = canvas.toDataURL();
            link.click();
        });
    }

    displayRandomQuote();
</script>
</body>
</html>
